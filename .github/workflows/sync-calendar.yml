name: Sync calendar

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-calendar
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: ${{ github.event.repository.default_branch }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Fetch iCal from Nextcloud
        run: |
          mkdir -p agendas
          curl -fsSL --max-time 30 \
            "https://nxtcld.lesamisdemarcel.fr/remote.php/dav/public-calendars/yFFj9TrYN2R8oCkT?export" \
            -o agendas/calendar.ics

      - name: Commit updated calendar if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agendas/calendar.ics
          if git diff --cached --quiet; then
            echo "No changes to agendas/calendar.ics"
          else
            git commit -m "chore: sync agendas/calendar.ics"
            git push origin "HEAD:${BRANCH_NAME}"
          fi
